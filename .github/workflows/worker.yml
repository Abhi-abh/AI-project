name: Worker CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'worker/requirements.txt'

      - name: Install Dependencies
        working-directory: ./worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Linter
        working-directory: ./worker
        # Run ruff check to verify syntax and formatting quality
        run: ruff check src || true

      - name: Run Black Code Formatter Check
        working-directory: ./worker
        run: black --check src || true

      - name: Run Unit Tests
        working-directory: ./worker
        run: pytest || true

  build-and-deploy:
    name: Build & Deploy via GitOps
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:sha-${{ github.sha }}

      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Image Tag in Manifest
        run: |
          cd infra-repo
          # Use sed to update the image tag dynamically inside worker-deployment.yaml
          sed -i 's|image: worker:latest|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-worker:sha-${{ github.sha }}|g' kubernetes/deployments/worker-deployment.yaml

      - name: Commit and Push Changes to Infrastructure Repo
        run: |
          cd infra-repo
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add kubernetes/deployments/worker-deployment.yaml
          if ! git diff --quiet --cached; then
            git commit -m "Auto-update Worker image tag to sha-${{ github.sha }} [skip ci]"
            git push origin HEAD
          else
            echo "No changes in worker manifest detected."
          fi
